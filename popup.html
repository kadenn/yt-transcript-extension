<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>YT Transcript Copier</title>
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        width: 300px;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #0f0f0f;
        color: #fff;
        padding: 16px;
      }

      header {
        display: flex;
        align-items: center;
        gap: 8px;
        margin-bottom: 14px;
      }

      header .logo {
        font-size: 20px;
      }

      header h1 {
        font-size: 14px;
        font-weight: 600;
        color: #fff;
      }

      #status {
        font-size: 12px;
        color: #aaa;
        min-height: 16px;
        margin-bottom: 12px;
        word-break: break-word;
      }

      #status.error {
        color: #ff6b6b;
      }

      #status.success {
        color: #69db7c;
      }

      .btn {
        width: 100%;
        padding: 10px 14px;
        border: none;
        border-radius: 8px;
        font-size: 13px;
        font-weight: 600;
        cursor: pointer;
        transition: background 0.15s, opacity 0.15s;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 6px;
      }

      .btn:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }

      #copyBtn {
        background: #ff0000;
        color: #fff;
        margin-bottom: 8px;
      }

      #copyBtn:hover:not(:disabled) {
        background: #cc0000;
      }

      #copyTimestampBtn {
        background: #272727;
        color: #ccc;
      }

      #copyTimestampBtn:hover:not(:disabled) {
        background: #333;
      }

      .spinner {
        display: none;
        width: 14px;
        height: 14px;
        border: 2px solid rgba(255, 255, 255, 0.3);
        border-top-color: #fff;
        border-radius: 50%;
        animation: spin 0.7s linear infinite;
      }

      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }

      .loading .spinner {
        display: inline-block;
      }

      #preview {
        margin-top: 12px;
        background: #1a1a1a;
        border-radius: 6px;
        padding: 10px;
        font-size: 11px;
        color: #888;
        max-height: 80px;
        overflow: hidden;
        line-height: 1.5;
        display: none;
        position: relative;
      }

      #preview::after {
        content: "";
        position: absolute;
        bottom: 0;
        left: 0;
        right: 0;
        height: 24px;
        background: linear-gradient(transparent, #1a1a1a);
      }
    </style>
  </head>
  <body>
    <header>
      <span class="logo">📋</span>
      <h1>YT Transcript Copier</h1>
    </header>

    <div id="status">Open a YouTube video to get started.</div>

    <button class="btn" id="copyBtn">
      <span class="spinner"></span>
      <span class="btn-text">Copy Transcript</span>
    </button>

    <button class="btn" id="copyTimestampBtn">
      <span class="spinner"></span>
      <span class="btn-text">Copy with Timestamps</span>
    </button>

    <div id="preview"></div>

    <script src="popup.js"></script>
  </body>
</html>
